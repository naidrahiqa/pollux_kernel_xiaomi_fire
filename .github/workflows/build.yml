# =============================================================================
# Pollux Kernel CI/CD — Orchestrator
# Handles: versioning, Telegram notifications, changelog, GitHub releases
# Delegates actual build to build-core.yml (reusable workflow)
# =============================================================================
# Secrets required (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN        - Bot token from @BotFather
#   TELEGRAM_CHANNEL_ID       - Success channel ID
#   TELEGRAM_ERROR_CHANNEL_ID - Error channel ID
# =============================================================================

name: Build Pollux Kernel

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.opencode/**'
      - '.github/scripts/**'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: '0'
        type: choice
        options:
          - '0 — Nightly'
          - '1 — Stable'
          - '2 — Hotfix'
      defconfig:
        description: 'Defconfig'
        required: true
        default: 'fire_defconfig'
        type: choice
        options:
          - fire_defconfig
          - mt6768_defconfig
          - mt6768_defconfig.debug
      lto:
        description: 'LTO mode'
        required: true
        default: 'thin'
        type: choice
        options:
          - thin
          - full
          - none

env:
  POLLUX_VARIANT: ${{ inputs.variant || '0' }}
  DEFCONFIG: ${{ inputs.defconfig || 'fire_defconfig' }}
  LTO: ${{ inputs.lto || 'thin' }}

jobs:
  # ── Prep: expose env vars as job outputs (env is not usable in uses.with) ─
  prep:
    name: Prepare build params
    runs-on: ubuntu-24.04
    outputs:
      variant: ${{ steps.p.outputs.variant }}
      defconfig: ${{ steps.p.outputs.defconfig }}
      lto: ${{ steps.p.outputs.lto }}
    steps:
      - id: p
        run: |
          echo "variant=${POLLUX_VARIANT}" >> $GITHUB_OUTPUT
          echo "defconfig=${DEFCONFIG}" >> $GITHUB_OUTPUT
          echo "lto=${LTO}" >> $GITHUB_OUTPUT

  # ── Version ────────────────────────────────────────────────────────
  version:
    name: Generate version
    needs: [prep]
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.POLLUX_VERSION }}
      tag: ${{ steps.v.outputs.POLLUX_TAG }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate version
        id: v
        run: |
          source .github/scripts/version.sh "${{ needs.prep.outputs.variant }}"
          echo "POLLUX_VERSION=${POLLUX_VERSION}" >> $GITHUB_OUTPUT
          echo "POLLUX_TAG=${POLLUX_TAG}" >> $GITHUB_OUTPUT

  # ── Notify: Build Start ────────────────────────────────────────────
  notify-start:
    name: Notify build start
    needs: [version]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Send Telegram start
        run: |
          bash .github/scripts/notify-telegram.sh \
            start \
            "${{ needs.version.outputs.version }}" \
            "${{ needs.version.outputs.tag }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  # ── Core Build ─────────────────────────────────────────────────────
  core-build:
    name: Build kernel
    needs: [prep, version]
    uses: ./.github/workflows/build-core.yml
    with:
      defconfig: ${{ needs.prep.outputs.defconfig }}
      lto: ${{ needs.prep.outputs.lto }}
      kernel_version: ${{ needs.version.outputs.version }}
      kernel_tag: ${{ needs.version.outputs.tag }}

  # ── Check build result ──────────────────────────────────────────────
  check-build:
    name: Check build result
    needs: [core-build]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Fail if build failed
        run: |
          if [ "${{ needs.core-build.outputs.status }}" != "success" ]; then
            echo "❌ Kernel build failed — workflow will fail"
            exit 1
          fi
          echo "✅ Kernel build succeeded"

  # ── Generate Changelog ─────────────────────────────────────────────
  generate-changelog:
    name: Generate changelog
    needs: [version, core-build]
    if: needs.core-build.outputs.status == 'success'
    runs-on: ubuntu-24.04
    outputs:
      path: ${{ steps.cl.outputs.path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: cl
        run: |
          bash .github/scripts/generate-changelog.sh > changelog.md
          echo "path=changelog.md" >> $GITHUB_OUTPUT
      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ needs.version.outputs.tag }}
          path: changelog.md
          retention-days: 7

  # ── Create GitHub Release ──────────────────────────────────────────
  create-release:
    name: Create release
    needs: [version, core-build, generate-changelog]
    if: needs.core-build.outputs.status == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: kernel-build-${{ needs.version.outputs.tag }}
      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog-${{ needs.version.outputs.tag }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Pollux ${{ needs.version.outputs.version }}
          body_path: changelog.md
          files: |
            pollux-kernel-${{ needs.version.outputs.tag }}.tar.zst
            artifacts/Image.gz
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Notify: Build Success ──────────────────────────────────────────
  notify-success:
    name: Notify success
    needs: [version, core-build, generate-changelog]
    if: needs.core-build.outputs.status == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog-${{ needs.version.outputs.tag }}
      - name: Send Telegram success
        run: |
          bash .github/scripts/notify-telegram.sh \
            success \
            "${{ needs.version.outputs.version }}" \
            "${{ needs.version.outputs.tag }}" \
            "changelog.md"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  # ── Notify: Build Failed ───────────────────────────────────────────
  notify-failed:
    name: Notify failure
    needs: [prep, version, core-build]
    if: ${{ always() && (needs.core-build.result != 'success' || needs.core-build.outputs.status == 'failed') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts (if available)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: kernel-build-${{ needs.version.outputs.tag }}
      - name: Send Telegram failure
        run: |
          bash .github/scripts/notify-telegram.sh \
            failed \
            "${{ needs.version.outputs.version }}" \
            "${{ needs.version.outputs.tag }}" \
            "build.log"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ERROR_CHANNEL_ID: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
