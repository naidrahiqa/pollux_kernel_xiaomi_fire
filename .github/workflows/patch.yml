# =============================================================================
# Pollux Kernel Patch — Apply KernelSU-Next + SUSFS
# Run this ONCE after initial setup or when updating patches
# =============================================================================

name: Apply Kernel Patches

on:
  workflow_dispatch:
    inputs:
      reapply:
        description: 'Force reapply patches'
        required: true
        default: false
        type: boolean

env:
  KERNELSU_REPO: https://github.com/KernelSU-Next/KernelSU-Next.git
  KERNELSU_BRANCH: legacy
  SUSFS_REPO: https://github.com/naidrahiqa/susf4ksu-legacy.git

jobs:
  patch:
    name: Apply KSU + SUSFS Patches
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            patch python3 p7zip-full wiggle

      - name: Clone SUSFS backport
        run: |
          git clone --depth=1 https://github.com/naidrahiqa/susf4ksu-legacy.git ../susf4ksu-legacy

      - name: Apply SUSFS patches
        run: |
          bash ../susf4ksu-legacy/core-scripts/apply.sh \
            . \
            --kernelsu-next \
            --mtk

      - name: Verify patches
        run: |
          bash ../susf4ksu-legacy/core-scripts/verify.sh . fire_defconfig

      - name: Check for .rej files
        run: |
          REJ_COUNT=$(find . -name "*.rej" 2>/dev/null | wc -l)
          if [ "$REJ_COUNT" -gt 0 ]; then
            echo "⚠️  Found $REJ_COUNT .rej files!"
            find . -name "*.rej"
            exit 1
          fi
          echo "✅ No rejected patches"

      - name: Commit changes
        run: |
          git config user.name "Pollux CI"
          git config user.email "ci@pollux-kernel"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            COMMIT_MSG="Pollux: Apply KernelSU-Next + SUSFS patches
          "
            COMMIT_MSG="${COMMIT_MSG}
        KernelSU-Next: ${KERNELSU_BRANCH} branch
        SUSFS: v2.2.0 backport (via naidrahiqa/susf4ksu-legacy)"
            git commit -m "${COMMIT_MSG}"
          fi

      - name: Push changes
        if: github.event_name == 'workflow_dispatch'
        run: |
          git push origin main
